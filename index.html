<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lunch Detector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#0A0D10;
    --panel:#12171C;
    --panel-2:#161C22;
    --line: rgba(198,255,61,0.14);
    --line-soft: rgba(255,255,255,0.06);
    --text:#EDEFF2;
    --muted:#8B98A5;
    --lime:#C6FF3D;
    --amber:#FF9F1C;
    --danger:#FB7176;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:
      radial-gradient(circle at 18% 12%, rgba(198,255,61,0.05), transparent 40%),
      radial-gradient(circle at 85% 88%, rgba(255,159,28,0.05), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow:hidden;
  }

  .mono{ font-family:'JetBrains Mono',monospace; }

  #app{
    display:grid;
    grid-template-columns: 1fr 340px;
    height:100vh;
    width:100vw;
  }

  /* ---------- LEFT: WHEEL STAGE ---------- */
  .stage{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .eyebrow{
    position:absolute;
    top:28px; left:32px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--lime);
    box-shadow:0 0 8px var(--lime);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }
  .eyebrow .label{
    font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted);
  }
  .eyebrow .label b{ color:var(--lime); font-weight:600; }

  .wheel-wrap{
    position:relative;
    width:min(58vh, 58vw, 620px);
    height:min(58vh, 58vw, 620px);
  }

  #wheelCanvas{
    width:100%; height:100%;
    display:block;
    filter: drop-shadow(0 0 40px rgba(0,0,0,0.55));
    transition: transform 4.2s cubic-bezier(.12,.85,.1,1);
  }

  .hub{
    position:absolute; top:50%; left:50%;
    width:64px; height:64px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background: var(--panel);
    border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    z-index:5;
    box-shadow: 0 0 0 6px rgba(198,255,61,0.06);
  }
  .hub svg{ width:26px; height:26px; }

  .pointer{
    position:absolute;
    top:-6px; left:50%;
    transform:translateX(-50%);
    z-index:6;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }

  /* reticle / lock-on */
  .reticle{
    position:absolute;
    pointer-events:none;
    opacity:0;
    z-index:7;
  }
  .reticle.show{
    opacity:1;
    animation: snap .5s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes snap{
    0%{ opacity:0; transform:scale(1.3); }
    60%{ opacity:1; transform:scale(0.94); }
    100%{ opacity:1; transform:scale(1); }
  }
  .reticle .corner{
    position:absolute; width:22px; height:22px;
    border:2.5px solid var(--lime);
  }
  .reticle .tl{ top:0; left:0; border-right:none; border-bottom:none; }
  .reticle .tr{ top:0; right:0; border-left:none; border-bottom:none; }
  .reticle .bl{ bottom:0; left:0; border-right:none; border-top:none; }
  .reticle .br{ bottom:0; right:0; border-left:none; border-top:none; }
  .reticle .tag{
    position:absolute;
    top:calc(100% + 6px); left:50%;
    transform:translateX(-50%);
    white-space:nowrap;
    background:var(--lime);
    color:#0A0D10;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:11px;
    letter-spacing:.06em;
    padding:3px 8px;
    border-radius:2px;
  }

  .spin-controls{
    margin-top:36px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }

  #spinBtn{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:16px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#0A0D10;
    background: var(--lime);
    border:none;
    padding:16px 46px;
    border-radius:4px;
    cursor:pointer;
    box-shadow: 0 0 0 0 rgba(198,255,61,0.5);
    transition: transform .12s ease, box-shadow .3s ease, background .2s ease;
  }
  #spinBtn:hover{ transform:translateY(-2px); box-shadow:0 6px 24px rgba(198,255,61,0.25); }
  #spinBtn:active{ transform:translateY(0px) scale(.98); }
  #spinBtn:disabled{
    background: #3a4048; color:#7a828c; cursor:not-allowed; transform:none; box-shadow:none;
  }

  .result-line{
    min-height:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--muted);
    letter-spacing:.02em;
  }
  .result-line b{ color:var(--text); }

  /* ---------- RIGHT: HUD PANEL ---------- */
  .hud{
    background:var(--panel);
    border-left:1px solid var(--line-soft);
    display:flex; flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  .hud-section{
    padding:20px 22px;
    border-bottom:1px solid var(--line-soft);
  }
  .hud-title{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .hud-title .count{ color:var(--lime); }

  /* roster list */
  #roster{
    display:flex; flex-direction:column; gap:6px;
    max-height:230px; overflow-y:auto;
    padding-right:4px;
  }
  #roster::-webkit-scrollbar{ width:5px; }
  #roster::-webkit-scrollbar-thumb{ background: var(--line-soft); border-radius:4px; }

  .roster-item{
    display:flex; align-items:center; gap:10px;
    padding:7px 10px;
    background:var(--panel-2);
    border-radius:4px;
    border:1px solid transparent;
  }
  .roster-item .swatch{
    width:8px; height:8px; border-radius:2px; flex:none;
  }
  .roster-item .name{
    flex:1; font-size:13.5px; font-weight:500;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .roster-item .rm{
    background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:15px; line-height:1; padding:2px 4px;
    border-radius:3px;
  }
  .roster-item .rm:hover{ color:var(--danger); background:rgba(251,113,118,0.1); }

  .add-row{
    display:flex; gap:6px; margin-top:10px;
  }
  #newSpot{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line-soft);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:8px 10px;
    border-radius:4px;
    outline:none;
  }
  #newSpot:focus{ border-color: var(--lime); }
  #addBtn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--lime);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:700;
    padding:0 14px;
    border-radius:4px;
    cursor:pointer;
  }
  #addBtn:hover{ background:rgba(198,255,61,0.08); }

  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    font-size:12.5px; color:var(--muted);
  }
  .switch{
    width:34px; height:18px; border-radius:20px;
    background:var(--panel-2);
    border:1px solid var(--line-soft);
    position:relative; cursor:pointer;
    flex:none;
  }
  .switch .knob{
    position:absolute; top:1px; left:1px;
    width:14px; height:14px; border-radius:50%;
    background:var(--muted);
    transition: all .18s ease;
  }
  .switch.on{ background:rgba(198,255,61,0.18); border-color:var(--lime); }
  .switch.on .knob{ left:17px; background:var(--lime); }

  /* log */
  .log-wrap{
    flex:1;
    overflow-y:auto;
    padding:16px 22px;
  }
  .log-wrap::-webkit-scrollbar{ width:5px; }
  .log-wrap::-webkit-scrollbar-thumb{ background:var(--line-soft); border-radius:4px; }

  .log-title{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:12px;
  }
  .log-entry{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    padding:6px 0;
    border-bottom:1px dashed var(--line-soft);
    display:flex; gap:8px;
  }
  .log-entry .t{ color:#5b636c; flex:none; }
  .log-entry .n{ color:var(--text); }
  .log-entry .c{ color:var(--lime); margin-left:auto; }
  .log-empty{ color:#5b636c; font-size:12px; font-family:'JetBrains Mono',monospace; }

  .footer-note{
    padding:14px 22px;
    font-size:11px;
    color:#5b636c;
    font-family:'JetBrains Mono',monospace;
    border-top:1px solid var(--line-soft);
  }

  @media (max-width: 900px){
    #app{ grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .hud{ border-left:none; border-top:1px solid var(--line-soft); height:auto; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="stage">
    <div class="eyebrow">
      <div class="dot"></div>
      <div class="label mono">SYS/<b>LUNCH-DETECTOR</b> — v1</div>
    </div>

    <div class="wheel-wrap" id="wheelWrap">
      <svg class="pointer" width="34" height="40" viewBox="0 0 34 40">
        <path d="M17 40 L2 6 Q17 -4 32 6 Z" fill="#EDEFF2" stroke="#0A0D10" stroke-width="1.5"/>
      </svg>
      <canvas id="wheelCanvas" width="900" height="900"></canvas>
      <div class="hub">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3.2" stroke="#C6FF3D" stroke-width="1.6"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#C6FF3D" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="reticle" id="reticle">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="tag" id="reticleTag">TARGET</div>
      </div>
    </div>

    <div class="spin-controls">
      <button id="spinBtn" class="mono">Spin</button>
      <div class="result-line mono" id="resultLine">Ready. <span id="rosterHint"></span></div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-section">
      <div class="hud-title">
        <span>Candidates</span>
        <span class="count mono" id="rosterCount">0</span>
      </div>
      <div id="roster"></div>
      <div class="add-row">
        <input id="newSpot" type="text" placeholder="Add a place…" maxlength="40" />
        <button id="addBtn" class="mono">ADD</button>
      </div>
    </div>

    <div class="hud-section">
      <div class="toggle-row" style="margin-bottom:10px;">
        <span>Exclude last pick from next spin</span>
        <div class="switch on" id="excludeToggle"><div class="knob"></div></div>
      </div>
      <div class="toggle-row">
        <span>Sound on lock-on</span>
        <div class="switch" id="soundToggle"><div class="knob"></div></div>
      </div>
    </div>

    <div class="log-wrap">
      <div class="log-title">Detection Log</div>
      <div id="logList"><div class="log-empty">No spins yet.</div></div>
    </div>

    <div class="footer-note">STORAGE: shared · office board</div>
  </div>
</div>

<script>
(async function(){
  const PALETTE = ["#2DD4BF","#6366F1","#FB7176","#F5A623","#C6FF3D","#E4567B","#38BDF8","#A78BFA","#34D399","#F472B6"];
  const DEFAULT_SPOTS = [
    "Kompliment", "Slajs", "Klementina", "Kašča",
    "Inglič", "Das ist Valter"
  ];

  let spots = [];
  let history = [];
  let excludeLast = true;
  let soundOn = false;
  let spinning = false;
  let currentRotation = 0;

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const rosterEl = document.getElementById('roster');
  const rosterCountEl = document.getElementById('rosterCount');
  const logListEl = document.getElementById('logList');
  const resultLine = document.getElementById('resultLine');
  const rosterHint = document.getElementById('rosterHint');
  const spinBtn = document.getElementById('spinBtn');
  const reticle = document.getElementById('reticle');
  const reticleTag = document.getElementById('reticleTag');
  const excludeToggle = document.getElementById('excludeToggle');
  const soundToggle = document.getElementById('soundToggle');

  // ---------- storage ----------
  async function loadState(){
    try{
      const s = await window.storage.get('lunch-detector:spots', true);
      spots = s ? JSON.parse(s.value) : DEFAULT_SPOTS.slice();
    }catch(e){ spots = DEFAULT_SPOTS.slice(); }
    try{
      const h = await window.storage.get('lunch-detector:history', true);
      history = h ? JSON.parse(h.value) : [];
    }catch(e){ history = []; }
    try{
      const cfg = await window.storage.get('lunch-detector:config', true);
      if(cfg){
        const parsed = JSON.parse(cfg.value);
        excludeLast = !!parsed.excludeLast;
      }
    }catch(e){}
  }

  async function saveSpots(){
    try{ await window.storage.set('lunch-detector:spots', JSON.stringify(spots), true); }catch(e){}
  }
  async function saveHistory(){
    try{ await window.storage.set('lunch-detector:history', JSON.stringify(history.slice(0,25)), true); }catch(e){}
  }
  async function saveConfig(){
    try{ await window.storage.set('lunch-detector:config', JSON.stringify({excludeLast}), true); }catch(e){}
  }

  // ---------- wheel drawing ----------
  function drawWheel(){
    const n = spots.length;
    const size = canvas.width;
    const cx = size/2, cy = size/2, r = size/2 - 6;
    ctx.clearRect(0,0,size,size);

    if(n === 0){
      ctx.fillStyle = '#161C22';
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth=3; ctx.stroke();
      return;
    }

    const slice = (Math.PI*2)/n;
    for(let i=0;i<n;i++){
      const start = i*slice - Math.PI/2;
      const end = start + slice;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,start,end);
      ctx.closePath();
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.globalAlpha = 0.88;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(10,13,16,0.9)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // label
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(start + slice/2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#0A0D10';
      const fontSize = Math.max(16, Math.min(26, 340/n));
      ctx.font = `700 ${fontSize}px 'JetBrains Mono', monospace`;
      const label = spots[i].length > 20 ? spots[i].slice(0,18)+'…' : spots[i];
      ctx.fillText(label, r - 26, 6);
      ctx.restore();
    }

    // center ring
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(198,255,61,0.35)';
    ctx.stroke();
  }

  // ---------- roster UI ----------
  function renderRoster(){
    rosterEl.innerHTML = '';
    rosterCountEl.textContent = spots.length;
    rosterHint.textContent = spots.length < 2 ? '(add at least 2 to spin)' : '';
    spots.forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'roster-item';
      row.innerHTML = `
        <div class="swatch" style="background:${PALETTE[i % PALETTE.length]}"></div>
        <div class="name">${escapeHtml(name)}</div>
        <button class="rm" data-i="${i}" title="Remove">✕</button>
      `;
      rosterEl.appendChild(row);
    });
    rosterEl.querySelectorAll('.rm').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        const i = parseInt(e.currentTarget.dataset.i,10);
        spots.splice(i,1);
        await saveSpots();
        renderRoster();
        drawWheel();
      });
    });
  }

  function renderLog(){
    if(history.length === 0){
      logListEl.innerHTML = '<div class="log-empty">No spins yet.</div>';
      return;
    }
    logListEl.innerHTML = history.slice(0,25).map(h => `
      <div class="log-entry">
        <span class="t">${h.time}</span>
        <span class="n">${escapeHtml(h.name)}</span>
      </div>
    `).join('');
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- spin logic ----------
  function pickIndex(){
    let pool = spots.map((_,i)=>i);
    if(excludeLast && history.length > 0 && spots.length > 1){
      const lastName = history[0].name;
      const lastIdx = spots.indexOf(lastName);
      if(lastIdx !== -1) pool = pool.filter(i => i !== lastIdx);
    }
    return pool[Math.floor(Math.random()*pool.length)];
  }

  function playBeep(){
    if(!soundOn) return;
    try{
      const actx = new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.15, actx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.35);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime+0.4);
    }catch(e){}
  }

  async function spin(){
    if(spinning || spots.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;
    reticle.classList.remove('show');
    resultLine.innerHTML = 'Scanning candidates…';

    const n = spots.length;
    const slice = 360/n;
    const targetIndex = pickIndex();

    // Landing angle: pointer is at top (12 o'clock). Slice i center offset = i*slice + slice/2 from 0deg (top), going clockwise.
    const targetCenter = targetIndex*slice + slice/2;
    const fullSpins = 5 + Math.floor(Math.random()*3); // 5-7 full turns
    // we rotate the wheel so that targetCenter ends at top (0deg / pointer)
    const finalRotation = fullSpins*360 + (360 - targetCenter);

    currentRotation += finalRotation;
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    await new Promise(res => setTimeout(res, 4300));

    const chosen = spots[targetIndex];
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    history.unshift({name: chosen, time: timeStr});
    await saveHistory();
    renderLog();

    reticleTag.textContent = `LOCKED · ${chosen.toUpperCase()}`;
    reticle.classList.add('show');
    playBeep();

    resultLine.innerHTML = `Detected: <b>${escapeHtml(chosen)}</b>`;
    spinning = false;
    spinBtn.disabled = false;
  }

  // ---------- events ----------
  spinBtn.addEventListener('click', spin);

  document.getElementById('addBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newSpot');
    const val = input.value.trim();
    if(!val) return;
    spots.push(val);
    input.value = '';
    await saveSpots();
    renderRoster();
    drawWheel();
  });
  document.getElementById('newSpot').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') document.getElementById('addBtn').click();
  });

  excludeToggle.addEventListener('click', async ()=>{
    excludeLast = !excludeLast;
    excludeToggle.classList.toggle('on', excludeLast);
    await saveConfig();
  });
  soundToggle.addEventListener('click', ()=>{
    soundOn = !soundOn;
    soundToggle.classList.toggle('on', soundOn);
  });

  // ---------- init ----------
  await loadState();
  excludeToggle.classList.toggle('on', excludeLast);
  renderRoster();
  renderLog();
  drawWheel();
})();
</script>
</body>
</html>
